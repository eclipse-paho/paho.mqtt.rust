name: Paho MQTT Rust

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

env:
  CARGO_TERM_COLOR: always
  MSRV: "1.75.0"

jobs:
  fmt:
    name: Rust Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: rustfmt
      - run: cargo fmt --all --check

  check:
    name: Rust Build Check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        rust:
          - stable
          - "1.75.0"  # MSRV — keep in sync with env.MSRV
        include:
          - os: windows-latest
            features: bundled,vendored-ssl
          - os: ubuntu-latest
            features: bundled,ssl
          - os: macos-latest
            features: bundled,ssl
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          override: true

      - uses: ./.github/actions/msrv-resolve

      - name: Build check
        run: cargo check --no-default-features --features ${{ matrix.features }} --all-targets

  clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.MSRV }}
          override: true
          components: clippy

      - uses: ./.github/actions/msrv-resolve

      - name: Clippy lints
        run: cargo +${{ env.MSRV }} clippy --no-deps --all-targets -- -D warnings

  test:
    name: Rust Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        rust:
          - stable
          - "1.75.0"  # MSRV — keep in sync with env.MSRV
        include:
          - os: windows-latest
            features: bundled,vendored-ssl
          - os: ubuntu-latest
            features: bundled,ssl
          - os: macos-latest
            features: bundled,ssl
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          override: true

      - uses: ./.github/actions/msrv-resolve

      - name: Run tests
        run: cargo test --no-default-features --features ${{ matrix.features }} --no-fail-fast

